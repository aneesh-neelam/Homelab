apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-upload-data
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-ml-cache
  namespace: immich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-server
    spec:
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283
              name: http
              protocol: TCP
            - containerPort: 8081
              name: metrics-api
              protocol: TCP
            - containerPort: 8082
              name: metrics-ms
              protocol: TCP
          env:
            - name: IMMICH_METRICS
              value: "true"
            - name: IMMICH_TELEMETRY_INCLUDE
              value: "all"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: password
            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: database
            - name: DB_HOSTNAME
              value: "pg-cluster-rw.postgresql.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: REDIS_HOSTNAME
              value: "valkey.valkey.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: IMMICH_MACHINE_LEARNING_URL
              value: "http://immich-machine-learning.immich.svc.cluster.local:3003"
          volumeMounts:
            - name: upload-data
              mountPath: /usr/src/app/upload
            - name: shared-pictures
              mountPath: /mnt/Shared/Pictures
              readOnly: true
            - name: shared-videos
              mountPath: /mnt/Shared/Videos
              readOnly: true
            - name: personal-aneesh-pictures
              mountPath: /mnt/Personal/Aneesh/Pictures
              readOnly: true
            - name: personal-aneesh-videos
              mountPath: /mnt/Personal/Aneesh/Videos
              readOnly: true
            - name: personal-arushi-pictures
              mountPath: /mnt/Personal/Arushi/Pictures
              readOnly: true
            - name: personal-arushi-videos
              mountPath: /mnt/Personal/Arushi/Videos
              readOnly: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "2"
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: immich-upload-data
        - name: shared-pictures
          hostPath:
            path: /mnt/Media/Personal Media/Pictures
            type: Directory
        - name: shared-videos
          hostPath:
            path: /mnt/Media/Personal Media/Videos
            type: Directory
        - name: personal-aneesh-pictures
          hostPath:
            path: /mnt/Media/Personal Media/Users/Aneesh/Pictures
            type: Directory
        - name: personal-aneesh-videos
          hostPath:
            path: /mnt/Media/Personal Media/Users/Aneesh/Videos
            type: Directory
        - name: personal-arushi-pictures
          hostPath:
            path: /mnt/Media/Personal Media/Users/Arushi/Pictures
            type: Directory
        - name: personal-arushi-videos
          hostPath:
            path: /mnt/Media/Personal Media/Users/Arushi/Videos
            type: Directory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-machine-learning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich-machine-learning
    spec:
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          ports:
            - containerPort: 3003
              name: http
              protocol: TCP
          volumeMounts:
            - name: ml-cache
              mountPath: /cache
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "2"
      volumes:
        - name: ml-cache
          persistentVolumeClaim:
            claimName: immich-ml-cache
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: immich-server
  ports:
    - name: http
      port: 2283
      targetPort: 2283
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-machine-learning
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: immich-machine-learning
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server-nodeport
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: immich-server
  ports:
    - name: http
      port: 2283
      targetPort: 2283
      nodePort: 31283
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server-metrics
  namespace: immich
  labels:
    app.kubernetes.io/name: immich-server
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: immich-server
  ports:
    - name: metrics-api
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: metrics-ms
      port: 8082
      targetPort: 8082
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: immich-metrics
  namespace: immich
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/instance: immich
    app.kubernetes.io/name: immich-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics-api
      interval: 30s
    - port: metrics-ms
      interval: 30s
