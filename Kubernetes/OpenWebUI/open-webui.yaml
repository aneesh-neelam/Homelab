apiVersion: v1
kind: Namespace
metadata:
  name: open-webui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: open-webui
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-rawfile-default
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app.kubernetes.io/name: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OPENWEBUI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openwebui-db-credentials
                  key: password
            - name: OLLAMA_BASE_URL
              value: "http://192.168.213.1:11434"
            - name: DATABASE_URL
              value: "postgresql://openwebui:$(OPENWEBUI_DB_PASSWORD)@pg-cluster-rw.postgresql.svc.cluster.local:5432/openwebui"
            - name: VECTOR_DB
              value: "pgvector"
            - name: PGVECTOR_DB_URL
              value: "postgresql://openwebui:$(OPENWEBUI_DB_PASSWORD)@pg-cluster-rw.postgresql.svc.cluster.local:5432/openwebui"
            - name: REDIS_URL
              value: "redis://valkey.valkey.svc.cluster.local:6379/0"
            - name: ENABLE_WEBSOCKET_SUPPORT
              value: "true"
            - name: WEBSOCKET_MANAGER
              value: "redis"
            - name: WEBSOCKET_REDIS_URL
              value: "redis://valkey.valkey.svc.cluster.local:6379/1"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              memory: "1536Mi"
              cpu: "500m"
            limits:
              memory: "1536Mi"
              cpu: "2"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app.kubernetes.io/name: open-webui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui-nodeport
  namespace: open-webui
  labels:
    app.kubernetes.io/name: open-webui
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30180
      protocol: TCP
