apiVersion: v1
kind: Endpoints
metadata:
  name: mac-mini-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/instance: mac-mini
    app.kubernetes.io/name: node-exporter
subsets:
  - addresses:
      # VMware Fusion Host-only network IP for Mac Mini (macstation.local)
      - ip: 192.168.213.1
    ports:
      - name: metrics
        port: 9100
        protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mac-mini-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/instance: mac-mini
    app.kubernetes.io/name: node-exporter
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mac-mini-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/instance: mac-mini
    app.kubernetes.io/name: node-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: metrics
      app.kubernetes.io/instance: mac-mini
      app.kubernetes.io/name: node-exporter
  endpoints:
    - port: metrics
      interval: 30s
      relabelings:
        - targetLabel: job
          replacement: node-exporter
