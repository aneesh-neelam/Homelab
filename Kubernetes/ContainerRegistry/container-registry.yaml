apiVersion: v1
kind: Namespace
metadata:
  name: container-registry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: container-registry-data
  namespace: container-registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: csi-rawfile-default
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: container-registry
  namespace: container-registry
  labels:
    app.kubernetes.io/name: container-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: container-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: container-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v2/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: container-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: container-registry
  namespace: container-registry
  labels:
    app.kubernetes.io/name: container-registry
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: container-registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: container-registry-gc
  namespace: container-registry
  labels:
    app.kubernetes.io/name: container-registry
spec:
  schedule: "0 3 * * 0"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: container-registry
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: gc
              image: registry:2
              command: ["sh", "-c"]
              args:
                - |
                  if [ -d /var/lib/registry/docker/registry/v2/repositories ] && [ "$(ls -A /var/lib/registry/docker/registry/v2/repositories)" ]; then
                    bin/registry garbage-collect /etc/docker/registry/config.yml
                  else
                    echo "No repositories found, skipping garbage collection"
                  fi
              volumeMounts:
                - name: data
                  mountPath: /var/lib/registry
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: container-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: container-registry-nodeport
  namespace: container-registry
  labels:
    app.kubernetes.io/name: container-registry
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: container-registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
