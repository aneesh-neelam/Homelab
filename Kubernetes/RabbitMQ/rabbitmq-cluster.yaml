apiVersion: v1
kind: Namespace
metadata:
  name: rabbitmq
---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq-cluster
  namespace: rabbitmq
spec:
  replicas: 3

  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"

  rabbitmq:
    additionalPlugins:
      - rabbitmq_prometheus
    additionalConfig: |
      vm_memory_high_watermark.relative = 0.9
      disk_free_limit.absolute = 850MiB

  persistence:
    storage: 1Gi
