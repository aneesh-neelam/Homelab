apiVersion: batch/v1
kind: Job
metadata:
  name: pg-create-databases
  namespace: postgresql
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-databases
          image: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
          command: ["sh", "-c"]
          args:
            - |
              psql -h pg-cluster-rw -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'nextcloud'" | grep -q 1 || psql -h pg-cluster-rw -U postgres -c "CREATE DATABASE nextcloud OWNER nextcloud;"
              psql -h pg-cluster-rw -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'currency_exchange_rates'" | grep -q 1 || psql -h pg-cluster-rw -U postgres -c "CREATE DATABASE currency_exchange_rates OWNER currencyexchangeratessync;"
              psql -h pg-cluster-rw -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'openwebui'" | grep -q 1 || psql -h pg-cluster-rw -U postgres -c "CREATE DATABASE openwebui OWNER openwebui;"
              psql -h pg-cluster-rw -U postgres -d openwebui -c "CREATE EXTENSION IF NOT EXISTS vector;"
              psql -h pg-cluster-rw -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'superset'" | grep -q 1 || psql -h pg-cluster-rw -U postgres -c "CREATE DATABASE superset OWNER superset;"
              psql -h pg-cluster-rw -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'immich'" | grep -q 1 || psql -h pg-cluster-rw -U postgres -c "CREATE DATABASE immich OWNER immich;"
              psql -h pg-cluster-rw -U postgres -d immich -c "CREATE EXTENSION IF NOT EXISTS vchord CASCADE;"
              psql -h pg-cluster-rw -U postgres -d immich -c "CREATE EXTENSION IF NOT EXISTS cube;"
              psql -h pg-cluster-rw -U postgres -d immich -c "CREATE EXTENSION IF NOT EXISTS earthdistance;"
              for role in superset grafana; do for db in nextcloud currency_exchange_rates openwebui superset immich; do psql -h pg-cluster-rw -U postgres -d "$db" -c "GRANT CONNECT ON DATABASE $db TO $role;"; done; done
              for role in superset grafana; do for db in nextcloud currency_exchange_rates openwebui superset immich; do psql -h pg-cluster-rw -U postgres -d "$db" -c "GRANT USAGE ON SCHEMA public TO $role; GRANT SELECT ON ALL TABLES IN SCHEMA public TO $role; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO $role;"; done; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-cluster-superuser
                  key: password
